<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Quadrado dourado com fundo preto -->
  <rect width="64" height="64" fill="#08080A" rx="2"/>
  <rect x="6" y="6" width="52" height="52" stroke="#C8A968" stroke-width="2.5" fill="none"/>
  
  <!-- "L" grande em Fraunces, ocupando bem o espaço -->
  <text x="32" y="46" 
        fill="#C8A968" 
        font-family="Fraunces, Georgia, serif" 
        font-size="36" 
        font-weight="500" 
        text-anchor="middle"
        letter-spacing="-1">L</text>
</svg>

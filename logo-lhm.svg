<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <!-- Monograma LHM dentro do quadrado dourado -->
  <g transform="translate(20, 20)">
    <!-- Quadrado externo -->
    <rect x="0" y="0" width="120" height="120" stroke="#C8A968" stroke-width="2" fill="none"/>
    <!-- Quadrado interno (detalhe arquitetônico) -->
    <rect x="10" y="10" width="100" height="100" stroke="#C8A968" stroke-width="0.8" fill="none" opacity="0.4"/>
    
    <!-- Letras LHM em monogram, fonte serif geométrica -->
    <g fill="#C8A968" font-family="Fraunces, Georgia, serif" font-weight="500">
      <!-- L -->
      <path d="M 25 35 L 25 85 L 50 85" stroke="#C8A968" stroke-width="3" stroke-linecap="square" fill="none"/>
      <!-- H -->
      <path d="M 55 35 L 55 85 M 55 60 L 75 60 M 75 35 L 75 85" stroke="#C8A968" stroke-width="3" stroke-linecap="square" fill="none"/>
      <!-- M -->
      <path d="M 80 85 L 80 35 L 90 65 L 100 35 L 100 85" stroke="#C8A968" stroke-width="3" stroke-linecap="square" fill="none" stroke-linejoin="miter"/>
    </g>
    
    <!-- Pequena marcação técnica no canto inferior -->
    <line x1="0" y1="125" x2="40" y2="125" stroke="#C8A968" stroke-width="0.5" opacity="0.5"/>
    <text x="0" y="138" fill="#C8A968" font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="1.5" opacity="0.7">EST. 2013</text>
  </g>
  
  <!-- Texto "Engenharia" ao lado -->
  <g transform="translate(170, 0)">
    <text x="0" y="80" fill="#FAFAFA" font-family="Fraunces, Georgia, serif" font-size="42" font-weight="400" letter-spacing="-1.5">
      Engenharia
    </text>
    <!-- Tagline em cinza claro -->
    <text x="0" y="108" fill="#8B8680" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="3" text-transform="uppercase">
      STEEL FRAME · ALTO PADRÃO
    </text>
  </g>
</svg>
